<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Find Your Seat · Petite &amp; Roy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Cinzel:wght@400;500&family=Great+Vibes&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --misty-pink:      #f2dde0;
  --misty-pink-mid:  #e8c8cc;
  --misty-pink-dark: #c9979e;
  --champagne:       #f5edcf;
  --champagne-mid:   #e8d9a8;
  --champagne-dark:  #c8a84b;
  --nude:            #e0c9b8;
  --nude-mid:        #cdb09a;
  --nude-dark:       #a07a60;
  --pecan:           #8b5e3c;
  --pecan-dark:      #6b4429;
  --pecan-light:     #b8895a;
  --bg:              #faf7f4;
  --surface:         #ffffff;
  --ink:             #3a2a1e;
  --ink-soft:        #6b4f3a;
  --ink-muted:       #a08070;
  --border:          #ecddd4;
  --shadow-s:        rgba(139,94,60,0.10);
  --shadow-g:        rgba(139,94,60,0.15);
  --t:               0.35s cubic-bezier(0.4,0,0.2,1);
  --font-display: 'Great Vibes', cursive;
  --font-serif:   'Cormorant Garamond', serif;
  --font-caps:    'Cinzel', serif;
  --font-body:    'EB Garamond', serif;
}

/* Color themes — each color used in the xlsx */
.color-nude         { --card-bg:#fdf8f5; --card-border:#cdb09a; --badge-bg:#a07a60; --badge-text:#fff; --comp-bg:#f8f2ed; --pill-border:#cdb09a; --dot-color:#b8957a; }
.color-pecan        { --card-bg:#faf5f2; --card-border:#c4a08a; --badge-bg:#7a4e35; --badge-text:#fff; --comp-bg:#f5ede8; --pill-border:#c4a08a; --dot-color:#a07050; }
.color-misty-pink   { --card-bg:#fdf5f6; --card-border:#e8c8cc; --badge-bg:#c9979e; --badge-text:#fff; --comp-bg:#faf0f1; --pill-border:#e8c8cc; --dot-color:#d4a0a6; }
.color-taupe        { --card-bg:#faf6f3; --card-border:#c8a882; --badge-bg:#ad7753; --badge-text:#fff; --comp-bg:#f5ede5; --pill-border:#c8a882; --dot-color:#c09060; }
.color-champagne    { --card-bg:#fdfaf0; --card-border:#e8d9a8; --badge-bg:#c8a84b; --badge-text:#fff; --comp-bg:#faf6e8; --pill-border:#e8d9a8; --dot-color:#d4ba70; }
.color-blush        { --card-bg:#faf7f5; --card-border:#c0a898; --badge-bg:#8b6858; --badge-text:#fff; --comp-bg:#f5f0ed; --pill-border:#c0a898; --dot-color:#a89080; }
.color-light-champagne { --card-bg:#fdfcf0; --card-border:#e0d898; --badge-bg:#b0a040; --badge-text:#fff; --comp-bg:#faf8e8; --pill-border:#e0d898; --dot-color:#c8b858; }

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{height:100%;scroll-behavior:smooth;}
body{
  font-family:var(--font-body);
  font-size:17px;
  background:var(--bg);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  overflow-x:hidden;
  position:relative;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 100% 55% at 50% 0%,rgba(242,221,224,0.4) 0%,transparent 60%),
    radial-gradient(ellipse 60% 40% at 10% 80%,rgba(200,168,75,0.06) 0%,transparent 50%),
    radial-gradient(ellipse 50% 50% at 90% 20%,rgba(224,201,184,0.15) 0%,transparent 50%);
  pointer-events:none;
}

/* Petals */
.petal{
  position:fixed;pointer-events:none;z-index:0;
  width:8px;height:10px;
  background:var(--misty-pink);
  border-radius:50% 0 50% 0;
  opacity:0;
  animation:petalfall linear infinite;
}
@keyframes petalfall{
  0%  {opacity:0;transform:translateY(-20px) rotate(0deg) translateX(0);}
  15% {opacity:0.5;}
  85% {opacity:0.18;}
  100%{opacity:0;transform:translateY(100vh) rotate(280deg) translateX(30px);}
}

/* ══ TWO-COLUMN LAYOUT ══ */
.sf-layout{
  position:relative;z-index:1;
  display:grid;
  grid-template-columns:280px 1fr;
  grid-template-rows:auto 1fr auto;
  grid-template-areas:
    "sidebar header"
    "sidebar main"
    "sidebar footer";
  width:100%;
  max-width:900px;
  min-height:100vh;
  margin:0 auto;
}

/* SIDEBAR */
.sf-sidebar{
  grid-area:sidebar;
  background:rgba(242,221,224,0.4);
  backdrop-filter:blur(18px);
  border-right:1px solid rgba(200,151,158,0.3);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:3rem 1.8rem;
  text-align:center;
  position:sticky;
  top:0;
  height:100vh;
  overflow:hidden;
}
.sf-sidebar::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(255,255,255,0.3) 0%,transparent 60%);
  pointer-events:none;
}
.sf-monogram-wrap{
  position:relative;
  width:120px;height:120px;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 1.8rem;
  animation:fadeDown 0.9s 0.1s ease both;
}
.sf-ring-svg{
  position:absolute;inset:0;
  width:100%;height:100%;
  color:var(--misty-pink-mid);
  animation:spin 35s linear infinite;
}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.sf-monogram-img{width:100%;height:100%;object-fit:contain;}
.sf-sidebar-names{
  font-family:var(--font-serif);
  font-size:1.65rem;font-style:italic;font-weight:300;
  color:var(--ink);line-height:1.3;margin-bottom:0.6rem;
  animation:fadeDown 0.9s 0.2s ease both;
}
.sf-sidebar-amp{
  font-family:var(--font-display);
  font-size:2.2rem;color:var(--pecan);
  display:block;line-height:1;margin:0.1rem 0;
}
.sf-sidebar-date{
  font-family:var(--font-caps);
  font-size:0.52rem;letter-spacing:0.32em;text-transform:uppercase;
  color:var(--pecan);margin-bottom:0.3rem;
  animation:fadeDown 0.9s 0.3s ease both;
}
.sf-sidebar-divider{
  width:40px;height:1px;
  background:linear-gradient(90deg,transparent,var(--misty-pink-dark),transparent);
  margin:1.4rem auto;
}

/* Legend */
.sf-legend{
  display:flex;flex-direction:column;gap:0.7rem;
  animation:fadeDown 0.9s 0.5s ease both;
  width:100%;
}
.sf-legend-title{
  font-family:var(--font-caps);
  font-size:0.48rem;letter-spacing:0.28em;text-transform:uppercase;
  color:var(--ink-muted);margin-bottom:0.1rem;
}
.sf-legend-table-group{
  display:flex;align-items:center;justify-content:space-between;
  padding:0.55rem 0.8rem;
  background:rgba(255,255,255,0.5);
  border-radius:10px;border:1px solid rgba(200,151,158,0.2);
}
.sf-legend-table-label{
  font-family:var(--font-caps);
  font-size:0.52rem;letter-spacing:0.18em;text-transform:uppercase;
  color:var(--ink-soft);
}
.sf-legend-swatches{display:flex;gap:0.4rem;align-items:center;}
.sf-legend-swatch{
  width:14px;height:14px;border-radius:50%;flex-shrink:0;
}
.sf-legend-swatch.nude        {background:#cdb09a;border:1.5px solid #a07a60;}
.sf-legend-swatch.pecan       {background:#8b5e3c;border:1.5px solid #6b4429;}
.sf-legend-swatch.misty-pink  {background:#e8c8cc;border:1.5px solid #c9979e;}
.sf-legend-swatch.taupe       {background:#c8a882;border:1.5px solid #ad7753;}
.sf-legend-swatch.champagne   {background:#e8d9a8;border:1.5px solid #c8a84b;}
.sf-legend-swatch.blush       {background:#c0a898;border:1.5px solid #8b6858;}
.sf-legend-swatch.light-champagne{background:#e0d898;border:1.5px solid #b0a040;}

/* HEADER */
.sf-header{
  grid-area:header;
  background:rgba(255,255,255,0.80);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:1.6rem 2.2rem 1.4rem;
  display:flex;align-items:center;justify-content:space-between;gap:1rem;
  position:relative;
}
.sf-header-title{
  font-family:var(--font-serif);
  font-size:clamp(1.4rem,3vw,1.9rem);
  color:var(--ink);font-style:italic;font-weight:300;
  animation:fadeRight 0.8s 0.2s ease both;
}
.sf-header-eyebrow{
  font-family:var(--font-caps);
  font-size:0.52rem;letter-spacing:0.3em;text-transform:uppercase;
  color:var(--pecan);opacity:0.8;margin-bottom:0.15rem;
  animation:fadeRight 0.8s 0.1s ease both;
}
.sf-view-tables-btn{
  display:flex;align-items:center;gap:0.55rem;
  background:rgba(242,221,224,0.4);border:1px solid var(--border);
  border-radius:30px;padding:0.55rem 1.2rem;
  font-family:var(--font-caps);font-size:0.56rem;letter-spacing:0.2em;text-transform:uppercase;
  color:var(--ink-soft);cursor:pointer;transition:all var(--t);white-space:nowrap;flex-shrink:0;
  animation:fadeLeft 0.8s 0.3s ease both;
}
.sf-view-tables-btn:hover{color:var(--surface);background:var(--pecan);border-color:var(--pecan);}

@keyframes fadeDown  {from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeRight {from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:translateX(0)}}
@keyframes fadeLeft  {from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:translateX(0)}}
@keyframes fadeUp    {from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* MAIN */
.sf-main{
  grid-area:main;
  padding:2rem 2.2rem 3rem;
  display:flex;flex-direction:column;gap:0;
  background:var(--bg);
}

/* Search */
.sf-search-wrap{animation:fadeUp 0.7s 0.45s ease both;margin-bottom:0.3rem;}
.sf-instruction{
  font-family:var(--font-serif);font-size:1.05rem;font-style:italic;
  color:var(--ink-muted);margin-bottom:1.1rem;line-height:1.6;
}
.sf-search-box{
  display:flex;align-items:center;gap:0.8rem;
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:16px;padding:1rem 1.4rem;
  box-shadow:0 4px 20px var(--shadow-s),0 0 0 4px rgba(200,151,158,0.06);
  transition:all var(--t);
}
.sf-search-box:focus-within{
  border-color:var(--misty-pink-dark);
  box-shadow:0 6px 28px var(--shadow-g),0 0 0 4px rgba(200,151,158,0.12);
}
.sf-search-icon{color:var(--pecan-light);flex-shrink:0;}
.sf-input{
  flex:1;background:transparent;border:none;outline:none;
  font-family:var(--font-serif);font-size:1.15rem;font-style:italic;
  color:var(--ink);caret-color:var(--misty-pink-dark);
}
.sf-input::placeholder{color:var(--ink-muted);font-style:italic;}
.sf-clear{
  background:none;border:none;cursor:pointer;
  color:var(--ink-muted);font-size:1rem;padding:0.2rem;line-height:1;
  transition:color var(--t);flex-shrink:0;display:none;
}
.sf-clear.visible{display:block;}
.sf-clear:hover{color:var(--pecan);}

/* Results */
.sf-results{display:flex;flex-direction:column;gap:1rem;margin-top:1.4rem;}

/* Result card */
.sf-result-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:18px;overflow:hidden;
  box-shadow:0 4px 18px var(--shadow-s),0 2px 8px var(--shadow-g);
  animation:cardIn 0.4s ease both;
  display:grid;grid-template-columns:1fr auto;align-items:center;
}
@keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.sf-card-left{padding:1.4rem 1rem 1.4rem 1.6rem;}
.sf-card-badge-wrap{
  padding:0 1.6rem 0 0;
  display:flex;align-items:center;justify-content:flex-end;
}
.sf-card-label{
  font-family:var(--font-caps);font-size:0.5rem;letter-spacing:0.26em;text-transform:uppercase;
  color:var(--ink-muted);margin-bottom:0.22rem;
}
.sf-card-name{
  font-family:var(--font-serif);font-size:1.55rem;font-weight:500;
  color:var(--ink);line-height:1.2;
}
.sf-color-dot{
  display:inline-block;width:10px;height:10px;border-radius:50%;
  background:var(--dot-color,var(--nude-mid));margin-right:0.4rem;vertical-align:middle;
}
.sf-badge{
  background:var(--badge-bg,var(--pecan));color:var(--badge-text,#fff);
  border-radius:10px;padding:0.42rem 1rem;
  font-family:var(--font-caps);font-size:0.6rem;letter-spacing:0.14em;text-transform:uppercase;
  white-space:nowrap;flex-shrink:0;box-shadow:0 2px 10px var(--shadow-s);
}

/* Color group badge */
.sf-color-group-badge{
  display:inline-flex;align-items:center;gap:0.35rem;
  margin-top:0.45rem;
  padding:0.22rem 0.75rem;
  border-radius:20px;
  border:1px solid var(--card-border);
  background:rgba(255,255,255,0.6);
  font-family:var(--font-caps);font-size:0.44rem;letter-spacing:0.18em;text-transform:uppercase;
  color:var(--ink-soft);
}
.sf-color-group-swatch{
  width:9px;height:9px;border-radius:50%;
  background:var(--dot-color);flex-shrink:0;
}

.sf-companions{
  grid-column:1 / -1;grid-row:2;
  padding:1rem 1.6rem 1.4rem;
  background:rgba(242,221,224,0.2);
  border-top:1px solid var(--border);
  margin-top:1rem;
}
.sf-comp-label{
  font-family:var(--font-caps);font-size:0.5rem;letter-spacing:0.22em;text-transform:uppercase;
  color:var(--ink-muted);margin-bottom:0.8rem;
  display:flex;align-items:center;gap:0.6rem;
}
.sf-comp-label::after{content:'';flex:1;height:1px;background:var(--border);}
.sf-pills{display:flex;flex-wrap:wrap;gap:0.45rem;}
.sf-pill{
  background:rgba(255,255,255,0.7);
  border:1px solid var(--border);
  border-radius:30px;padding:0.28rem 0.85rem;
  font-family:var(--font-body);font-size:0.85rem;color:var(--ink-soft);
  display:flex;align-items:center;gap:0.38rem;
}
.sf-pill::before{content:'✦';color:var(--dot-color,var(--nude-mid));font-size:0.45rem;flex-shrink:0;}

/* Empty / Idle */
.sf-empty{text-align:center;padding:2.5rem 0;animation:fadeUp 0.4s ease both;}
.sf-empty-icon{color:var(--misty-pink-dark);font-size:2.4rem;margin-bottom:0.6rem;}
.sf-empty-text{font-family:var(--font-serif);font-style:italic;font-size:1.1rem;color:var(--ink-soft);}
.sf-empty-sub{font-family:var(--font-body);font-size:0.82rem;color:var(--ink-muted);margin-top:0.5rem;line-height:1.6;}
.sf-idle{
  text-align:center;padding:3rem 0 1rem;
  animation:fadeUp 0.6s 0.6s ease both;
  display:flex;flex-direction:column;align-items:center;
}
.sf-idle-monogram{width:80px;height:80px;object-fit:contain;opacity:0.25;margin-bottom:1.2rem;}
.sf-idle-text{font-family:var(--font-serif);font-style:italic;font-size:1rem;color:var(--ink-muted);line-height:1.7;}

/* FOOTER */
.sf-footer{
  grid-area:footer;text-align:center;
  padding:1.3rem 2.2rem calc(1.3rem + env(safe-area-inset-bottom));
  border-top:1px solid var(--border);
  background:rgba(255,255,255,0.70);backdrop-filter:blur(8px);
}
.sf-footer-logo{font-family:var(--font-display);font-size:1.7rem;color:var(--ink);margin-bottom:0.15rem;}
.sf-footer-date{font-family:var(--font-caps);font-size:0.5rem;letter-spacing:0.24em;text-transform:uppercase;color:var(--ink-muted);}

/* TABLES OVERLAY */
#tables-overlay{
  position:fixed;inset:0;z-index:900;
  background:rgba(139,94,60,0.3);backdrop-filter:blur(10px);
  display:flex;align-items:flex-end;justify-content:center;
  animation:fadeOverlay 0.25s ease;
}
@keyframes fadeOverlay{from{opacity:0;}to{opacity:1;}}
@media(min-height:600px){#tables-overlay{align-items:center;}}
#tables-overlay.hidden{display:none;}
.tables-panel{
  background:var(--bg);border-radius:22px 22px 0 0;
  padding:2rem 1.5rem calc(2.8rem + env(safe-area-inset-bottom));
  width:100%;max-width:640px;
  max-height:88vh;overflow-y:auto;
  display:flex;flex-direction:column;gap:1.5rem;
  box-shadow:0 -10px 40px var(--shadow-g);
  animation:sheetUp 0.35s cubic-bezier(0.32,0.72,0,1);
}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@media(min-height:600px){.tables-panel{border-radius:22px;max-height:85vh;}}
.tables-panel-header{display:flex;align-items:flex-start;justify-content:space-between;}
.tables-eyebrow{font-family:var(--font-caps);font-size:0.5rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--pecan-light);margin-bottom:0.2rem;}
.tables-title{font-family:var(--font-serif);font-size:1.8rem;color:var(--ink);font-style:italic;font-weight:300;}
.tables-close{
  background:none;border:1px solid var(--border);border-radius:8px;
  width:32px;height:32px;cursor:pointer;color:var(--ink-muted);
  font-size:0.8rem;display:flex;align-items:center;justify-content:center;
  transition:all var(--t);flex-shrink:0;
}
.tables-close:hover{background:var(--border);color:var(--ink);}
.tables-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem;}

/* Table card with color coding */
.table-card{
  border-radius:14px;padding:1.2rem;
  animation:cardIn 0.3s ease both;
  border:2px solid transparent;
}
.table-card.color-nude        {background:#fdf8f5;border-color:#cdb09a;}
.table-card.color-pecan       {background:#faf5f2;border-color:#c4a08a;}
.table-card.color-misty-pink  {background:#fdf5f6;border-color:#e8c8cc;}
.table-card.color-taupe       {background:#faf6f3;border-color:#c8a882;}
.table-card.color-champagne   {background:#fdfaf0;border-color:#e8d9a8;}
.table-card.color-blush       {background:#faf7f5;border-color:#c0a898;}
.table-card.color-light-champagne{background:#fdfcf0;border-color:#e0d898;}
.table-card-header{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:0.8rem;padding-bottom:0.7rem;
  border-bottom:1px solid var(--border);
}
.table-card-name{font-family:var(--font-caps);font-size:0.65rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--ink);}
.table-card-count{font-family:var(--font-body);font-size:0.75rem;color:var(--ink-muted);}
.table-card-guests{display:flex;flex-direction:column;gap:0.35rem;}
.table-guest-row{display:flex;align-items:center;gap:0.5rem;}
.table-guest-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.table-guest-name{font-family:var(--font-body);font-size:0.82rem;color:var(--ink-soft);}
/* Dot colors per theme */
.table-card.color-nude .table-guest-dot        {background:#a07a60;}
.table-card.color-pecan .table-guest-dot       {background:#7a4e35;}
.table-card.color-misty-pink .table-guest-dot  {background:#c9979e;}
.table-card.color-taupe .table-guest-dot       {background:#ad7753;}
.table-card.color-champagne .table-guest-dot   {background:#c8a84b;}
.table-card.color-blush .table-guest-dot       {background:#8b6858;}
.table-card.color-light-champagne .table-guest-dot{background:#b0a040;}
.tables-empty{text-align:center;padding:2rem;display:flex;flex-direction:column;align-items:center;gap:0.5rem;}
.tables-empty-icon{font-size:1.8rem;color:var(--misty-pink-dark);}
.tables-empty-text{font-family:var(--font-serif);font-style:italic;font-size:1rem;color:var(--ink-muted);}

/* ADMIN PANEL */
#admin-overlay{
  position:fixed;inset:0;z-index:900;
  background:rgba(139,94,60,0.3);backdrop-filter:blur(10px);
  display:flex;align-items:flex-end;justify-content:center;
}
#admin-overlay.hidden{display:none;}
.admin-panel{
  background:var(--bg);border-radius:22px 22px 0 0;
  padding:2rem 1.5rem calc(2.8rem + env(safe-area-inset-bottom));
  width:100%;max-width:520px;
  max-height:90vh;overflow-y:auto;
  box-shadow:0 -10px 40px var(--shadow-g);
  animation:sheetUp 0.35s cubic-bezier(0.32,0.72,0,1);
}
.admin-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 1.6rem;}
.admin-title{font-family:var(--font-serif);font-size:1.5rem;color:var(--ink);font-style:italic;margin-bottom:1.3rem;}
.afield{display:flex;flex-direction:column;gap:0.28rem;margin-bottom:0.9rem;}
.afield label{font-family:var(--font-caps);font-size:0.56rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--pecan-light);}
.afield input{
  background:rgba(242,221,224,0.2);border:1px solid var(--border);
  border-radius:10px;padding:0.65rem 0.9rem;
  font-family:var(--font-body);font-size:0.9rem;color:var(--ink);
  outline:none;transition:border-color var(--t);
}
.afield input:focus{border-color:var(--misty-pink-dark);}
.afield input::placeholder{color:var(--ink-muted);}
.btn-add-guest{
  background:var(--pecan);color:#fff;border:none;
  padding:0.7rem 1.6rem;border-radius:10px;
  font-family:var(--font-caps);font-size:0.63rem;letter-spacing:0.16em;text-transform:uppercase;
  cursor:pointer;transition:all var(--t);margin-bottom:1.5rem;
}
.btn-add-guest:hover{background:var(--pecan-dark);}
.admin-list{max-height:220px;overflow-y:auto;display:flex;flex-direction:column;gap:0.3rem;margin-bottom:1rem;}
.admin-row{
  display:flex;align-items:center;gap:0.8rem;padding:0.55rem 0.8rem;
  background:rgba(242,221,224,0.15);border:1px solid var(--border);border-radius:10px;
}
.admin-row-name{font-family:var(--font-body);font-size:0.88rem;color:var(--ink);flex:1;}
.admin-row-meta{font-family:var(--font-body);font-size:0.72rem;color:var(--ink-muted);}
.btn-del{
  background:none;border:1px solid var(--border);border-radius:4px;color:var(--ink-muted);
  width:24px;height:24px;font-size:0.65rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all var(--t);flex-shrink:0;
}
.btn-del:hover{border-color:#b94040;color:#b94040;}
.admin-footer{display:flex;flex-wrap:wrap;gap:0.5rem;border-top:1px solid var(--border);padding-top:1rem;}
.abtn{font-family:var(--font-caps);font-size:0.6rem;letter-spacing:0.14em;text-transform:uppercase;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;transition:all var(--t);}
.abtn-export{background:none;border:1px solid var(--pecan);color:var(--pecan);}
.abtn-export:hover{background:var(--pecan);color:#fff;}
.abtn-import{background:none;border:1px solid var(--pecan-light);color:var(--pecan-light);display:inline-block;}
.abtn-import:hover{background:var(--pecan-light);color:#fff;}
.abtn-clear{background:none;border:1px solid var(--border);color:var(--ink-muted);}
.abtn-clear:hover{border-color:#b94040;color:#b94040;}
.abtn-close{background:var(--border);border:none;color:var(--ink);}
.abtn-close:hover{background:var(--nude-mid);}

/* Table Sketch */
.sf-table-sketch{
  grid-column:1 / -1;
  padding:1rem 1.6rem 1.4rem;
  background:var(--comp-bg,rgba(242,221,224,0.2));
  border-top:1px solid var(--card-border,var(--border));
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:0.7rem;
}
.sf-sketch-label{
  font-family:var(--font-caps);font-size:0.5rem;letter-spacing:0.22em;text-transform:uppercase;
  color:var(--ink-muted);
  display:flex;align-items:center;gap:0.6rem;width:100%;
}
.sf-sketch-label::after{content:'';flex:1;height:1px;background:var(--card-border,var(--border));}
.sf-sketch-img{
  width:100%;max-width:420px;
  border-radius:10px;
  border:1.5px solid var(--card-border,var(--border));
  box-shadow:0 2px 10px var(--shadow-s);
  display:block;
}
.sf-sketch-placeholder{
  width:100%;max-width:420px;
  height:200px;
  border-radius:10px;
  border:1.5px dashed var(--card-border,var(--border));
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:0.5rem;
  background:rgba(255,255,255,0.5);
}
.sf-sketch-placeholder-icon{
  font-size:2rem;color:var(--dot-color);opacity:0.5;
}
.sf-sketch-placeholder-text{
  font-family:var(--font-serif);font-style:italic;font-size:0.9rem;color:var(--ink-muted);
  text-align:center;line-height:1.5;
}

/* MOBILE */
@media(max-width:640px){
  .sf-layout{
    grid-template-columns:1fr;
    grid-template-areas:"header" "main" "footer";
  }
  .sf-sidebar{display:none;}
  .sf-main{padding:1.5rem 1.2rem 2rem;}
  .sf-header{padding:1.2rem 1.2rem 1rem;}
  .sf-card-name{font-size:1.2rem;}
  .sf-footer{padding:1rem 1.2rem calc(1rem + env(safe-area-inset-bottom));}
}
</style>
</head>

/* ── SEARCH ── */
function sfSearch() {
  const raw = (document.getElementById('sf-search').value || '').trim();
  const q = raw.toLowerCase();
  const clearBtn = document.getElementById('sf-clear');
  clearBtn.classList.toggle('visible', q.length > 0);
  const results = document.getElementById('sf-results');

  if (raw === ADMIN_PASSWORD) {
    document.getElementById('sf-search').value = '';
    clearBtn.classList.remove('visible');
    renderIdle();
    openAdmin();
    return;
  }

  if (!q) { renderIdle(); return; }

  const guests = window._guests || [];
  const matches = guests.filter(g => g.name && g.name.toLowerCase().includes(q));

  if (!matches.length) {
    results.innerHTML = `<div class="sf-empty">
      <div class="sf-empty-icon">✦</div>
      <p class="sf-empty-text">No guests found matching "${esc(q)}"</p>
      <p class="sf-empty-sub">Please try a different spelling,<br>or ask the wedding coordinator for assistance.</p>
    </div>`;
    return;
  }

  results.innerHTML = matches.map((g, i) => {
    const companions = g.companions || [];
    const compHTML = companions.length
      ? `<div class="sf-companions">
          <div class="sf-comp-label">Seated with</div>
          <div class="sf-pills">${companions.map(c => `<span class="sf-pill">${esc(c)}</span>`).join('')}</div>
        </div>` : '';
    const sketchSrc = TABLE_SKETCHES[g.color] || '';
    const sketchHTML = `<div class="sf-table-sketch">
      <div class="sf-sketch-label">Your Seat Location</div>
      ${sketchSrc
        ? `<img class="sf-sketch-img" src="${esc(sketchSrc)}" alt="Table sketch" loading="lazy"/>`
        : `<div class="sf-sketch-placeholder">
            <div class="sf-sketch-placeholder-icon">✦</div>
            <div class="sf-sketch-placeholder-text">Table sketch coming soon.</div>
           </div>`
      }
    </div>`;
    return `<div class="sf-result-card" style="animation-delay:${i*70}ms">
      <div class="sf-card-left">
        <div class="sf-card-label">Your Name</div>
        <div class="sf-card-name">${esc(g.name)}</div>
      </div>
      <div class="sf-card-badge-wrap">
        <span class="sf-badge">${esc(g.table)}</span>
      </div>
      ${compHTML}
      ${sketchHTML}
    </div>`;
  }).join('');
}

function renderIdle() {
  const results = document.getElementById('sf-results');
  results.innerHTML = `<div class="sf-idle">
    <img class="sf-idle-monogram" src="${document.querySelector('.sf-monogram-img').src}" alt=""/>
    <p class="sf-idle-text">Begin typing your name to find<br>your place at our table.</p>
  </div>`;
}

function sfClear() {
  document.getElementById('sf-search').value = '';
  document.getElementById('sf-clear').classList.remove('visible');
  sfSearch();
  document.getElementById('sf-search').focus();
}
function sfKey(e) { if (e.key === 'Escape') sfClear(); }

function openAdmin()  { document.getElementById('admin-overlay').classList.remove('hidden'); renderAdminList(); updateGuestCount(); }
function closeAdmin() { document.getElementById('admin-overlay').classList.add('hidden'); }

/* ── VIEW ALL TABLES ── */
function openTables()  { renderTables(); document.getElementById('tables-overlay').classList.remove('hidden'); }
function closeTables() { document.getElementById('tables-overlay').classList.add('hidden'); }

function renderTables() {
  const grid = document.getElementById('tables-grid'); if (!grid) return;
  const guests = window._guests || [];
  if (!guests.length) {
    grid.innerHTML = `<div class="tables-empty"><div class="tables-empty-icon">✦</div><p class="tables-empty-text">No guests added yet</p></div>`;
    return;
  }
  // Group by table + color
  const groups = {};
  guests.forEach(g => {
    const key = (g.table || 'Unassigned') + '|||' + (g.color || 'nude');
    if (!groups[key]) groups[key] = {table: g.table||'Unassigned', color: g.color||'nude', names:[]};
    groups[key].names.push(g.name);
  });
  const sorted = Object.values(groups).sort((a,b) => {
    const ta = a.table.localeCompare(b.table, undefined, {numeric:true});
    if (ta !== 0) return ta;
    return a.color.localeCompare(b.color);
  });
  grid.innerHTML = sorted.map((g, i) => {
    const rows = g.names.map(n => `<div class="table-guest-row"><div class="table-guest-dot"></div><span class="table-guest-name">${esc(n)}</span></div>`).join('');
    return `<div class="table-card" style="animation-delay:${i*40}ms">
      <div class="table-card-header">
        <span class="table-card-name">${esc(g.table)}</span>
      </div>
      <div class="table-card-guests">${rows}</div>
    </div>`;
  }).join('');
}

function addGuest() {
  const n = document.getElementById('admin-name');
  const t = document.getElementById('admin-table');
  const c = document.getElementById('admin-color');
  const comp = document.getElementById('admin-companions');
  const name = n.value.trim(), table = t.value.trim();
  const color = c.value.trim() || 'nude';
  const companions = comp.value.split(',').map(s => s.trim()).filter(Boolean);
  if (!name || !table) { if (!name) flashInvalid(n); if (!table) flashInvalid(t); return; }
  window._guests.push({ name, table, color, companions });
  saveLocalGuests();
  renderAdminList(); updateGuestCount(); sfSearch();
  n.value=''; t.value=''; c.value=''; comp.value=''; n.focus();
}

function deleteGuest(i) {
  window._guests.splice(i, 1);
  saveLocalGuests();
  renderAdminList(); updateGuestCount(); sfSearch();
}

function renderAdminList() {
  const list = document.getElementById('admin-list'); if (!list) return;
  const guests = window._guests || [];
  if (!guests.length) { list.innerHTML = `<p style="font-size:0.8rem;color:var(--ink-muted);padding:0.5rem 0">No guests added yet.</p>`; return; }
  list.innerHTML = guests.map((g, i) => `
    <div class="admin-row">
      <div style="flex:1;min-width:0">
        <div class="admin-row-name">${esc(g.name)}</div>
        <div class="admin-row-meta">${esc(g.table)} · ${g.color||'nude'}${g.companions?.length ? ' · '+g.companions.length+' companion'+(g.companions.length>1?'s':'') : ''}</div>
      </div>
      <button class="btn-del" onclick="deleteGuest(${i})">✕</button>
    </div>`).join('');
}

function updateGuestCount() {
  const el = document.getElementById('guest-count');
  if (el) el.textContent = `(${(window._guests||[]).length})`;
}

function exportData() {
  const blob = new Blob([JSON.stringify(window._guests, null, 2)], {type:'application/json'});
  const a = Object.assign(document.createElement('a'), {href:URL.createObjectURL(blob), download:'petite-roy-guests.json'});
  a.click(); URL.revokeObjectURL(a.href);
}

function importData(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!Array.isArray(data)) throw new Error();
      const valid = data.filter(g => g.name && g.table);
      window._guests = valid.map(g => ({name:g.name, table:g.table, color:g.color||'nude', companions:g.companions||[]}));
      saveLocalGuests(); renderAdminList(); updateGuestCount(); sfSearch();
    } catch(err) { alert('Import failed — please use a valid JSON file.'); }
    e.target.value = '';
  };
  reader.readAsText(file);
}

function clearAll() {
  if (!confirm('Remove all guests and restore defaults? This cannot be undone.')) return;
  window._guests = DEFAULT_GUESTS.map(g => ({...g}));
  saveLocalGuests(); renderAdminList(); updateGuestCount(); sfSearch();
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function flashInvalid(el) { el.style.borderColor='#b94040'; setTimeout(()=>(el.style.borderColor=''),1200); }

/* ── INIT ── */
document.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  const pre = params.get('name') || params.get('n');
  if (pre) {
    const input = document.getElementById('sf-search');
    input.value = decodeURIComponent(pre);
    document.getElementById('sf-clear').classList.add('visible');
    sfSearch();
  }
  document.getElementById('tables-overlay').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeTables();
  });
  setTimeout(() => document.getElementById('sf-search').focus(), 600);
});
</script>
